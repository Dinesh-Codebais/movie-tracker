<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <div class="logo">
            🎬 MovieTracker
        </div>

        <ul class="nav-links">

            <li><a href="#">Home</a></li>
            <li><a href="#">Movies</a></li>
            <li><a href="#">Trending</a></li>
            <li><a href="#">Contact</a></li>

        </ul>

    </nav>

    <!-- HERO SECTION -->

    <section class="hero">

        <div class="hero-content">

            <h1>
                Track Every Movie You Watch
            </h1>

            <p>
                Discover trending movies, create watchlists,
                and never miss your favorite films again.
            </p>

            <a href="#" class="btn">
                Explore Movies
            </a>

        </div>

    </section>
    <section class="trending">

    <h2>Trending Movies</h2>

    <div class="movie-grid">

        <div class="movie-card">
            <img src="images/movie1.jpg" alt="">
            <h3>Interstellar</h3>
            <p>⭐ 8.7</p>
        </div>

        <div class="movie-card">
            <img src="images/movie2.jpg" alt="">
            <h3>Oppenheimer</h3>
            <p>⭐ 8.5</p>
        </div>

        <div class="movie-card">
            <img src="images/movie3.jpg" alt="">
            <h3>Avatar</h3>
            <p>⭐ 8.1</p>
        </div>

    </div>
    

</section>


</body>
</html>
